name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run test suite
        # The full suite is hermetic — no network calls. Live evals are
        # marked `live` and deselected via pyproject addopts; placeholder
        # values satisfy import-time config checks.
        env:
          OPENAI_API_KEY: sk-placeholder-for-hermetic-tests
          ANTHROPIC_API_KEY: sk-ant-placeholder-for-hermetic-tests
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          SUPABASE_KEY: placeholder
        run: |
          pytest --cov=assistant --cov=api --cov-report=term -v
